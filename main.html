<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinlist • Main</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="background-video" autoplay loop muted playsinline preload="auto">
      <source src="assets/BG.mp4" type="video/mp4" />
    </video>

    <header class="hero">
      <video class="hero__media" autoplay loop muted playsinline preload="auto">
        <source src="assets/header.webm" type="video/webm" />
      </video>
    </header>

    <main class="content">
      <section class="auth-card" aria-label="Главная страница">
        <h1>Main</h1>
        <p class="auth-message">Доступ открыт. Аккаунт верифицирован.</p>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
