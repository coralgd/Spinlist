<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinlist</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <video
        class="hero__media"
        autoplay
        loop
        muted
        playsinline
        preload="auto"
        poster="assets/header.gif"
      >
        <source src="assets/header.mp4" type="video/mp4" />
        <source src="assets/header.webm" type="video/webm" />
        <img src="assets/header.gif" alt="Анимированный баннер Spinlist" />
      </video>
    </header>

    <main class="content">
      <h1>Spinlist</h1>
      <p>Главная страница для публикации через GitHub Pages.</p>
    </main>
  </body>
</html>
